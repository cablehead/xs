name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo:
    if: (github.event_name == 'push' || github.event.pull_request.draft == false)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run clippy
      run: cargo clippy --verbose
    - name: Install nu (Linux)
      if: runner.os == 'Linux'
      run: |
        curl -sL https://github.com/nushell/nushell/releases/download/0.112.1/nu-0.112.1-x86_64-unknown-linux-musl.tar.gz | tar xz
        echo "$PWD/nu-0.112.1-x86_64-unknown-linux-musl" >> $GITHUB_PATH
    - name: Install nu (macOS)
      if: runner.os == 'macOS'
      run: |
        curl -sL https://github.com/nushell/nushell/releases/download/0.112.1/nu-0.112.1-aarch64-apple-darwin.tar.gz | tar xz
        echo "$PWD/nu-0.112.1-aarch64-apple-darwin" >> $GITHUB_PATH
    - name: Install nu (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/nushell/nushell/releases/download/0.112.1/nu-0.112.1-x86_64-pc-windows-msvc.zip" -OutFile nu.zip
        Expand-Archive nu.zip -DestinationPath nu-install -Force
        echo "$PWD\nu-install" | Out-File -Append -FilePath $env:GITHUB_PATH
    - name: Add xs to PATH (Unix)
      if: runner.os != 'Windows'
      run: echo "$PWD/target/debug" >> $GITHUB_PATH
    - name: Add xs to PATH (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: echo "$PWD\target\debug" | Out-File -Append -FilePath $env:GITHUB_PATH
    - name: Run xs.nu tests
      run: nu tests/test_xs_nu.nu

  nix-flake:
    if: (github.event_name == 'push' || github.event.pull_request.draft == false)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Set NIX_FIRST_BUILD_UID (macOS only)
      if: runner.os == 'macOS'
      run: echo "NIX_FIRST_BUILD_UID=400" >> $GITHUB_ENV
    - uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v15
      with:
        name: xs
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - name: Flake check
      run: nix run . -- --version
    - name: Test default dev shell
      run: nix develop --command nu --version
    - name: Verify xs available in default shell
      run: nix develop --command xs --version
    - name: Test bash dev shell
      run: nix develop .#bash --command bash --version
    - name: Verify xs available in bash shell
      run: nix develop .#bash --command xs --version
